<!DOCTYPE html>
<html>

<head>
    <style>
        .post-card {
            width: 400px;
            border: 1px solid #dbdbdb;
            margin: 20px auto;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        .post-header {
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .post-header p {
            margin: 0;
            font-weight: bold;
        }

        .post-card img {
            width: 100%;
            display: block;
        }

        .post-description p {
            padding: 15px;
            
        }
        .small-img {
            width: 100%;
            display: block;}
    </style>

</head>

<body>

    <div class="post-card">

        <div class="post-header">
            <p>My first photo </p>
            <span>12/14</span>
        </div>

        <img src="https://medac.es/sites/default/files/blog/destacadas/tecnicas-de-judo.jpg" alt="Entreno">

        <div class="post-description">
            <p>Esta es mi primera foto para la entrega de mi tarjeta  #BreatheCode</p>
        </div>

    </div>
     <div class="post-card">

        <div class="post-header">
            <p>My second photo </p>
            <span>12/15</span>
        </div>
        
        <img class="small-img" src="https://as2.ftcdn.net/v2/jpg/01/78/21/27/1000_F_178212788_RjGs88jtvdjCPYGmtCozHk287Wb2F02W.jpg" alt="Entreno">

        <div class="post-description">
            <p>Esta es mi primera foto para la entrega de mi tarjeta  #BreatheCode</p>
        </div>

    </div>

    

    

</body>

</html>
